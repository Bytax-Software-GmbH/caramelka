services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Inlined into the client bundle at build time (full URL incl. https://)
        VITE_BASE_URL: ${SERVICE_URL_APP}
    environment:
      # Coolify auto-generates the FQDN + secrets via these magic variables
      SERVICE_FQDN_APP_3000: ""
      VITE_BASE_URL: ${SERVICE_URL_APP}
      DATABASE_URL: postgresql://caramelka:${SERVICE_PASSWORD_POSTGRES}@db:5432/caramelka
      BETTER_AUTH_SECRET: ${SERVICE_PASSWORD_64_AUTHSECRET}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    # Schema migrieren, dann leere DB einmalig mit Platzhalter-Katalog befüllen
    # (db:seed:prod ist idempotent und lässt bestehende Daten unangetastet).
    command: ["sh", "-c", "pnpm db:migrate && pnpm db:seed:prod"]
    environment:
      DATABASE_URL: postgresql://caramelka:${SERVICE_PASSWORD_POSTGRES}@db:5432/caramelka
      BETTER_AUTH_SECRET: ${SERVICE_PASSWORD_64_AUTHSECRET}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    # Tell Coolify this is a one-shot container, not a long-running service
    exclude_from_hc: true

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: caramelka
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: caramelka
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caramelka -d caramelka"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
